kind = "web"
previewPath = "/"
title = "Vertalle"
version = "1.0.0"
id = "artifacts/vertalle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19727

[services.development]
run = "pnpm --filter @workspace/vertalle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vertalle", "run", "build" ]
publicDir = "artifacts/vertalle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19727"
BASE_PATH = "/"
